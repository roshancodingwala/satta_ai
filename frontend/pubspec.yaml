name: sattva_ai
description: SattvaAI — AI-powered emotional wellness blending Gemini with Indian Classical Wisdom.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # HTTP / API
  http: ^1.2.1

  # Audio Recording (for voice check-in)
  record: ^5.1.2
  audioplayers: ^6.0.0

  # Local Storage (for mood history)
  shared_preferences: ^2.3.2

  # Typography
  google_fonts: ^6.2.1

  # UI Extras
  flutter_spinkit: ^5.2.1
  url_launcher: ^6.3.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
